#
# Right half is built as the BLE peripheral in the upstream Corne shield.
# nice!view provides its own peripheral-side status widget there, so the stock
# display widgets must be disabled to avoid duplicate symbol definitions.
#

CONFIG_ZMK_USB=n
CONFIG_ZMK_WIDGET_OUTPUT_STATUS=n
CONFIG_ZMK_WIDGET_LAYER_STATUS=n
CONFIG_ZMK_WIDGET_BATTERY_STATUS=n
CONFIG_ZMK_WIDGET_WPM_STATUS=n
